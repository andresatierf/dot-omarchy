force_keyboard_focus = true                                                 # forces keyboard forcus to stay in Walker
selection_wrap = true                                                       # wrap list if at bottom or top
theme = "omarchy-default"                                                   # theme to use
additional_theme_location = "~/.local/share/omarchy/default/walker/themes/"
hide_action_hints = true                                                    # globally hide the action hints

[placeholders]
"default" = { input = " Search...", list = "No Results" } # placeholders for input and empty list, key is the providers name, so f.e. "desktopapplications" or "menus:other"

[keybinds]
quick_activate = []

[columns]
symbols = 1 # providers to be queried by default

[providers]
max_results = 256                              # 256 should be enough for everyone
default = ["desktopapplications", "websearch"]

[[providers.prefixes]]
prefix = "/"
provider = "providerlist"

[[providers.prefixes]]
prefix = "."
provider = "files"

[[providers.prefixes]]
prefix = ":"
provider = "symbols"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = "$"
provider = "clipboard"

[[providers.prefixes]]
prefix = "!"
provider = "menus:rbw"
hide_action_hints = false

[providers.actions]
"menus:rbw" = [
  # { action = "copypassword", label = "copy pass", default = true, bind = "Return" },
  { action = "autotype", label = "autotype", bind = "alt 1" },
  { action = "typeusername", label = "type user", bind = "alt 2" },
  { action = "typepassword", label = "type pass", bind = "alt 3" },
  { action = "typetotp", label = "type totp", bind = "alt 4" },
  { action = "copypassword", label = "copy pass", bind = "alt c" },
  { action = "copyusername", label = "copy user", bind = "alt u" },
  { action = "copytotp", label = "copy totp", bind = "alt t" },
  # { action = "open", label = "details", bind = "alt m" },
  { action = "syncvault", label = "sync", bind = "alt s", after = "AsyncClearReload" },
]
"menus:rbw_details" = [
  { action = "copy", label = "copy", default = true, bind = "Return" },
  { action = "type", label = "type", bind = "alt t" },
]

[[emergencies]]
text = "Restart Walker"
command = "omarchy-restart-walker"

bitwarden = [
  { action = "typeusername", label = "type username", bind = "ctrl u" },
  { action = "typepassword", label = "type password", default = true, bind = "ctrl p" },
  { action = "typeotp", label = "type 2fa", bind = "ctrl t" },
  { action = "copyusername", label = "copy username", bind = "shift Return" },
  { action = "copypassword", label = "copy password", default = true, bind = "Return" },
  { action = "copyotp", label = "copy 2fa", bind = "ctrl Return" },
  # { action = "menu", label = "menu", bind = "ctrl m" },
  { action = "syncvault", label = "sync", bind = "ctrl s" },
]
